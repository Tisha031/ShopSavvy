{% extends "/user/userlayout.html" %}
{% block content %}

        <!-- My Account Start -->
        <div class="my-account">
            <div class="container">
                <div class="row">
                    <div class="col-md-3">
                        <div class="nav flex-column nav-pills" role="tablist" aria-orientation="vertical">
                            
                          
                            <a class="nav-link active" id="account-nav" data-toggle="pill" href="#account-tab" role="tab">Account Details</a>
                            <a class="nav-link"  id="orders-nav" data-toggle="pill" href="#orders-tab" role="tab">Orders</a>
                            <a class="nav-link" href="{{ url_for('Ulogout') }}">Logout</a>
                        </div>
                    </div>
                    <div class="col-md-9">
                        <div class="tab-content">

                            <div class="tab-pane fade show active" id="account-tab" role="tabpanel" aria-labelledby="account-nav">
                                <h4>Account Details</h4>
                              
                                <div class="row">
                                   
                                <form class="forms-sample" action="{{url_for('update_pdetail')}}" method="post">
                                  
                                    <input class="form-control" type="text" value="{{ acont[0] }}" name="user_id" hidden>
                                    <div class="row">
                                        <div class="col-md-4">   
                                            <input type="text" value="{{ acont[2] }}" name="name" placeholder="First Name">
                                        </div>

                                        <div class="col-md-4">
                                            <input type="text" value="{{ acont[1] }}" name="u_email" placeholder="Email" readonly>
                                        </div>
                                    
                                        <div class="col-md-4">
                                            <input type="text" value="{{ acont[3] }}" name="mobile" placeholder="Mobile">
                                        </div>
                                    
                                        <div class="col-md-12">
                                            <input type="text" value="{{ acont[7] }}" name="address" placeholder="Address">
                                        </div>
                                    
                                        <div class="col-md-12">
                                            <button type="submit" class="btn btn-success">Update Account</button>
                                            <br><br>
                                        </div>
                                    </div>
                                </div>
                              
                            </div>
                            
                            <div class="tab-pane fade " id="orders-tab" role="tabpanel" aria-labelledby="orders-nav">
                                <div class="table-responsive">
                                    <table class="table table-bordered">
                                        <thead class="thead-dark">
                                            <tr>
                                                <th>No</th>
                                                <th>Product</th>
                                                <th>Date</th>
                                                <th>Price</th>
                                                <th>Status</th>
                                                <th>Action</th>

                                        </thead>

                                            </tr>
                                            <tr>

                                                <td>Approved</td>
                                                <td><button>View</button></td>
                                            </tr>
                                            <tr>

                                                <td>Approved</td>
                                                <td><button>View</button></td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                           
                           
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- My Account End -->

        

    </body>
</html>


{% endblock %}
