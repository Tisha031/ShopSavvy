{% extends '/user/userlayout.html' %}
{% block content %}
<div class="product-customize">
  <div class="container">
    <div class="row">
      <div class="col-lg-12">
        <div class="row align-items-center product-detail-top">
          <div class="col-md-5">
            <div class="product-slider-single">
              <img src="../../{{ t[3] }}" alt="Product Image" />
            </div>
          </div>
          <div class="col-md-7">
            <div class="product-content">
              <div class="title">
                <h2>Customize Your {{ t[2] }}</h2>
              </div>
              <div class="price">₹{{ t[3] }}</div>
              <div class="details">
                <p><strong>Description:</strong> {{ t[5] }}</p>
              </div>

              <form action="#" method="POST">
                <div class="form-group">
                  <label for="size">Select Size:</label>
                  <select name="size" id="size" class="form-control">
                    <option value="Small">Small</option>
                    <option value="Medium">Medium</option>
                    <option value="Large">Large</option>
                  </select>
                </div>

                <div class="form-group mt-3">
                  <label for="color">Choose Color:</label>
                  <select name="color" id="color" class="form-control">
                    <option value="Red">Red</option>
                    <option value="Blue">Blue</option>
                    <option value="Black">Black</option>
                  </select>
                </div>

                <div class="form-group mt-3">
                  <label for="engraving">Engraving Text (Optional):</label>
                  <input type="text" name="engraving" id="engraving" class="form-control" maxlength="30" placeholder="Enter custom text" />
                </div>

                <div class="action mt-4">
                  <button type="submit" class="btn btn-primary"><i class="fa fa-cart-plus"></i> Add to Cart</button>
                </div>
              </form>

             

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
