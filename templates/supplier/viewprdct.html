{% extends 'supplier/supplayout.html' %}
{% block content %}
  <div class="container">
    <div class="page-inner">
      <div class="row">
        <div class="col-md-12">
          <div class="card">
            <div class="card-header">
              <div class="card-title">VIEW CATEGORY</div>
            </div>
            <div class="card-body">
              <table class="table mt-3">
                <thead>
                  <tr>
                    <th scope="col">No</th>

                    <th scope="col">Product Name</th>
                    <th scope="col">Price</th>
                    <th scope="col">Product Image</th>
                    <th scope="col">Action</th>
                  </tr>
                </thead>
                <tbody>
                  {% set count = 1 %}
                  {% for l in lol %}
                    {% set count = loop.index %}

                    <tr>
                      <td>{{ count }}</td>
                      <td>{{ l.2 }}</td>
                      <td>{{ l.3 }}</td>

                      <td>
                        <img style="height: 80px; width: 85px" src="../{{ l.4 }}" />
                      </td> <td>
                        <div class="form-button-action">
                          <button type="button" data-bs-toggle="tooltip" title="" class="btn btn-link btn-primary btn-lg" data-original-title="Edit Task"><i class="fa fa-edit"></i></button>
                          <button type="button" data-bs-toggle="tooltip" title="" class="btn btn-link btn-danger" data-original-title="Remove"><i class="fa fa-times"></i></button>
                        </div>
                      </td>
                    </tr>
                  {% endfor %}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
