{% block content %}

{% if msg %}
<script> 
alert('{{msg}}') 
</script>
{% endif %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>ShopSavvy Admin</title>
  <link rel="stylesheet" href="/static/admin/vendors/iconfonts/font-awesome/css/all.min.css">
  <link rel="stylesheet" href="/static/admin/vendors/css/vendor.bundle.base.css">
  <link rel="stylesheet" href="/static/admin/vendors/css/vendor.bundle.addons.css">
  <link rel="stylesheet" href="/static/admin/css/style.css">
  <link rel="shortcut icon" href="/static/admin/images/favicon.png" />
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Poppins', sans-serif;
    }
    .auth-form-light {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
    }
    .brand-logo {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
    }
    .auth-form-btn {
      background: #6a11cb;
      background: linear-gradient(to right, #2575fc, #6a11cb);
      border: none;
      transition: 0.3s;
    }
    .auth-form-btn:hover {
      background: linear-gradient(to right, #6a11cb, #2575fc);
    }
    select.form-control, input.form-control {
      border-radius: 5px;
      border: 1px solid #ccc;
      transition: 0.3s;
    }
    select.form-control:focus, input.form-control:focus {
      border-color: #6a11cb;
      box-shadow: 0 0 5px rgba(106, 17, 203, 0.5);
    }
  </style>
</head>
<body>
  <div class="container-scroller">
    <div class="container-fluid page-body-wrapper full-page-wrapper">
      <div class="content-wrapper d-flex align-items-center auth">
        <div class="row w-100">
          <div class="col-lg-4 mx-auto">
            <div class="auth-form-light text-left p-5">
              <div class="brand-logo">
                <h3 class="text-primary font-weight-bold">ShopSavvy</h3>
              </div>
              <h4 class="text-center">Welcome Back!</h4>  
              <p class="text-center text-muted">Please login to continue</p>
              
              <form class="pt-3" method="POST" action="{{url_for('admin_login')}}">
               
                <div class="form-group">
                  <input type="email" class="form-control form-control-lg" id="exampleInputEmail1" placeholder="Username" name="Email" required>
                </div>
                <div class="form-group">
                  <input type="password" class="form-control form-control-lg" id="exampleInputPassword1" placeholder="Password" name="Password" required>
                </div>
                <div class="mt-3">
                  <button type="submit" name="submit" class="btn btn-block btn-primary btn-lg font-weight-medium auth-form-btn">LOGIN</button>
                </div>
                <div class="text-center mt-4">
                  <a href="#" class="auth-link text-primary">Lost Your Password?</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="/static/admin/vendors/js/vendor.bundle.base.js"></script>
  <script src="/static/admin/vendors/js/vendor.bundle.addons.js"></script>
  <script src="/static/admin/js/off-canvas.js"></script>
  <script src="/static/admin/js/hoverable-collapse.js"></script>
  <script src="/static/admin/js/misc.js"></script>
  <script src="/static/admin/js/settings.js"></script>
  <script src="/static/admin/js/todolist.js"></script>
</body>
</html>
{% endblock %}
