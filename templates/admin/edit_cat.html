{% extends "/admin/adminlayout.html" %}
{% block content %}

{% if msg %}
<script> 
alert('{{msg}}') 
</script>
{% endif %}

<style>
    .form-group.inline {
    display: flex;
    justify-content: space-between;
}

.form-group.inline label {
    flex: 1;
}

.form-group.inline input[type="checkbox"] {
    margin-left: 10px;
}
</style>

<div class="main-panel">
    <div class="content-wrapper">
      <div class="page-header">
        <h3 class="page-title">
          EDIT CATEGORY
        </h3>
      </div>
      
      <div class="row">
        <div class="col-12 grid-margin stretch-card">
          <div class="card">
            <div class="card-body">
              {% for j in category %}

              <form class="forms-sample" method="POST" action="{{url_for('edit_cat_process')}}">
                <input type="hidden" class="form-control" id="exampleInputcategoryname" value="{{j[0]}}" name="cat_id" >

                <div class="form-group">
                  <label for="exampleInputcategory name">Category Name</label>
                  <input type="text" class="form-control" id="exampleInputcategoryname" value="{{j[1]}}" name="cat_name">
                </div>


                <div class="form-group">
                  <label for="exampleInputcategory description">Category Description</label>
                  <textarea class="form-control" id="exampleInputcategorydesc"  name="description">{{j[2]}}</textarea>
                </div>

{% endfor %}
                  <button class="btn btn-light">Cancel</button> &nbsp; 
                <button type="submit" class="btn btn-primary mr-2">Update Category</button>
                
              </form>
            </div>
          </div>
        </div>
    </div>


{% endblock %}
